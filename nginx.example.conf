# Example Nginx Configuration for OrdoVertex Production
# 
# Setup:
# 1. Install nginx and certbot
# 2. Copy this to /etc/nginx/sites-available/ordovertex
# 3. Update server_name with your domain
# 4. Get SSL cert: certbot --nginx -d yourdomain.com
# 5. Enable: ln -s /etc/nginx/sites-available/ordovertex /etc/nginx/sites-enabled/

upstream ordovertex_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream ordovertex_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=1r/s;

server {
    listen 80;
    server_name ordovertex.yourdomain.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ordovertex.yourdomain.com;

    # SSL Configuration (certbot will configure these)
    ssl_certificate /etc/letsencrypt/live/ordovertex.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ordovertex.yourdomain.com/privkey.pem;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Frontend - Static files
    location / {
        proxy_pass http://ordovertex_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API - Rate limited
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        # Stricter rate limiting for auth endpoints
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://ordovertex_api;
        }
        
        proxy_pass http://ordovertex_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Webhooks - Separate rate limit
    location /webhook/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://ordovertex_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (no rate limit)
    location /health {
        proxy_pass http://ordovertex_api;
        access_log off;
    }
}
