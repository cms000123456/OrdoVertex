version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ordovertex-db
    environment:
      POSTGRES_USER: ordovertex
      POSTGRES_PASSWORD: ordovertex_secret
      POSTGRES_DB: ordovertex
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordovertex"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ordovertex-redis
    volumes:
      - ./.data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ordovertex-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://ordovertex:ordovertex_secret@postgres:5432/ordovertex
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-this-is-a-32-char-dev-key-change-me!}
      PORT: 3001
      # Initial admin user (optional - defaults to admin@example.com / admin123)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      # Rate limiting (development values - more permissive)
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-100}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      # Logging
      LOGS_DIR: /app/logs
    volumes:
      - ./backend:/app
      - ./.data/logs:/app/logs
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm install && npx prisma@5 db push --accept-data-loss && npx prisma@5 generate && npx prisma@5 db seed && npm run dev"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ordovertex-worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://ordovertex:ordovertex_secret@postgres:5432/ordovertex
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-this-is-a-32-char-dev-key-change-me!}
      LOGS_DIR: /app/logs
      TZ: ${TZ:-Europe/Stockholm}
    volumes:
      - ./backend:/app
      - ./.data/logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma@5 generate && npm run worker"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -u ${REDIS_URL:-redis://redis:6379} get worker:heartbeat | grep -qE '^[0-9]+$'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: ordovertex-frontend
    
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - api
    command: sh -c "npm install --legacy-peer-deps && npm start"
