<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradient matching OrdoVertex theme -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="5" y="5" width="90" height="90" rx="20" ry="20" fill="url(#bgGradient)"/>
  
  <!-- Workflow nodes and connections -->
  <g fill="white" filter="url(#glow)">
    <!-- Top node -->
    <circle cx="50" cy="25" r="10"/>
    
    <!-- Left node -->
    <circle cx="25" cy="55" r="8"/>
    
    <!-- Right node -->
    <circle cx="75" cy="55" r="8"/>
    
    <!-- Bottom node -->
    <circle cx="50" cy="80" r="6"/>
    
    <!-- Connection lines -->
    <path d="M 50 35 L 50 45 L 28 50" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 50 35 L 50 45 L 72 50" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 32 60 L 45 72 L 50 74" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 68 60 L 55 72 L 50 74" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
