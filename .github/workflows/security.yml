name: Security Audit

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'

jobs:
  # ========================================================================
  # FULL SCANS - Run on main branch, PRs to main, and schedule
  # ========================================================================

  # Backend npm audit - FULL
  backend-audit-full:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        # Don't fail the build - just report for now
        # Projects should fix vulnerabilities over time
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "### Backend Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate --json 2>/dev/null | node -e "
            const data = '';
            process.stdin.on('data', c => data.push(c));
            process.stdin.on('end', () => {
              try {
                const audit = JSON.parse(data.join(''));
                const counts = audit.metadata?.vulnerabilities || {};
                console.log('Vulnerabilities found:');
                console.log('  Critical:', counts.critical || 0);
                console.log('  High:', counts.high || 0);
                console.log('  Moderate:', counts.moderate || 0);
                console.log('  Low:', counts.low || 0);
              } catch(e) {
                console.log('Could not parse audit results');
              }
            });
          " || echo "Audit completed with findings"

  # Frontend npm audit - FULL
  frontend-audit-full:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: |
          # Use legacy peer deps for React 17/18 compatibility issues
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Run npm audit
        run: npm audit --audit-level=moderate --legacy-peer-deps
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "### Frontend Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate --legacy-peer-deps 2>&1 | head -50 || true

  # CodeQL Analysis - FULL (only on main and schedule)
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  # Trivy vulnerability scanner - FULL (only on main and schedule)
  trivy-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner - Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Run Trivy vulnerability scanner - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'trivy-backend'

      - name: Upload Trivy frontend results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'trivy-frontend'

  # ========================================================================
  # LIGHTWEIGHT SCANS - Run on dev branch only
  # ========================================================================

  # Quick audit - LIGHTWEIGHT (dev branch only)
  quick-audit-dev:
    name: Quick Security Check (Dev)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Quick Backend Audit (Critical only)
        working-directory: ./backend
        run: |
          npm ci --quiet
          npm audit --audit-level=critical || echo "Critical vulnerabilities found (see logs)"
        continue-on-error: true

      - name: Quick Frontend Audit (Critical only)
        working-directory: ./frontend
        run: |
          npm ci --quiet --legacy-peer-deps || npm install --legacy-peer-deps --quiet
          npm audit --audit-level=critical --legacy-peer-deps || echo "Critical vulnerabilities found (see logs)"
        continue-on-error: true

  # ========================================================================
  # SHARED SCANS - Run on all branches and PRs
  # ========================================================================

  # Secret scanning - ALL branches
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Scanning for potential hardcoded secrets..."
          
          # Files and patterns to exclude
          EXCLUDE_PATTERN="node_modules|\.git|dist|build|coverage|\.env\.|example|sample|test|spec|README|CHANGELOG|\.d\.ts|package-lock|yarn\.lock|\.github/workflows"
          
          # Suspicious patterns (more specific to avoid false positives)
          # Only matches actual assignments with suspicious values (not variable names, not config examples)
          declare -a SUSPICIOUS_PATTERNS=(
            # Hardcoded passwords (not env vars, not empty strings, not config keys)
            'password[[:space:]]*=[[:space:]]*["'\''"'\'''][a-zA-Z0-9!@#$%^&*]{8,}["'\''"'\''"]'  
            # Hardcoded secrets (minimum 16 chars to avoid false positives)
            'secret[[:space:]]*=[[:space:]]*["'\''"'\''"'][a-zA-Z0-9_\-]{16,}["'\''"'\''"]' 
            # Hardcoded API keys (typical key patterns)
            'api[_-]?key[[:space:]]*=[[:space:]]*["'\''"'\''"']sk-[a-zA-Z0-9]{20,}["'\''"'\''"]'
            'api[_-]?key[[:space:]]*=[[:space:]]*["'\''"'\''"']AKIA[0-9A-Z]{16}["'\''"'\''"]'
            # Private keys
            'BEGIN[[:space:]]+(RSA|DSA|EC|OPENSSH)[[:space:]]+PRIVATE[[:space:]]+KEY'
            # AWS secrets
            'aws_secret_access_key[[:space:]]*=[[:space:]]*["'\''"'\''"'][a-zA-Z0-9/+=]{20,}["'\''"'\''"]'
            # Generic high-entropy strings that look like secrets
            'bearer[[:space:]]+[a-zA-Z0-9_\-\.]{40,}'
          )
          
          found_issues=0
          
          for pattern in "${SUSPICIOUS_PATTERNS[@]}"; do
            matches=$(grep -r -n -i "$pattern" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.json" --include="*.yml" --include="*.yaml" . 2>/dev/null | \
              grep -vE "$EXCLUDE_PATTERN" | \
              grep -v "process\.env\." | \
              grep -v "req\.env\." | \
              grep -v "^[[:space:]]*//" | \
              grep -v "^[[:space:]]*\*" | \
              grep -v "^[[:space:]]*#" | \
              head -10 || true)
            
            if [ -n "$matches" ]; then
              echo ""
              echo "⚠️  Potential secret pattern found:"
              echo "$matches"
              found_issues=$((found_issues + 1))
            fi
          done
          
          echo ""
          if [ $found_issues -gt 0 ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⚠️  WARNING: Found $found_issues potential issues."
            echo "   Review the matches above - they may be false positives."
            echo "   Excluded: env vars, comments, example files, tests"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            # Don't fail the build - just warn
            exit 0
          else
            echo "✅ No obvious hardcoded secrets detected in source files."
          fi
        shell: bash

  # Dependency review - PRs ONLY
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Only fail on high/critical for new dependencies in PRs
          fail-on-severity: high
          # Allow dependencies with known vulnerabilities if needed
          allow-ghsas: false
