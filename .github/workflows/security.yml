name: Security Audit

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'

jobs:
  # ========================================================================
  # FULL SCANS - Run on main branch, PRs to main, and schedule
  # ========================================================================

  # Backend npm audit - FULL
  backend-audit-full:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: false

      - name: Run npm audit fix check (informational)
        run: |
          echo "Checking for auto-fixable vulnerabilities..."
          npm audit fix --dry-run 2>&1 || true

  # Frontend npm audit - FULL
  frontend-audit-full:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: false

      - name: Run npm audit fix check (informational)
        run: |
          echo "Checking for auto-fixable vulnerabilities..."
          npm audit fix --dry-run 2>&1 || true

  # CodeQL Analysis - FULL (only on main and schedule)
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

  # Trivy vulnerability scanner - FULL (only on main and schedule)
  trivy-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner - Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Run Trivy vulnerability scanner - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'trivy-backend'

      - name: Upload Trivy frontend results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'trivy-frontend'

  # ========================================================================
  # LIGHTWEIGHT SCANS - Run on dev branch only
  # ========================================================================

  # Quick audit - LIGHTWEIGHT (dev branch only)
  quick-audit-dev:
    name: Quick Security Check (Dev)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Quick Backend Audit (Critical only)
        working-directory: ./backend
        run: |
          npm ci --quiet
          npm audit --audit-level=critical || true

      - name: Quick Frontend Audit (Critical only)
        working-directory: ./frontend
        run: |
          npm ci --quiet
          npm audit --audit-level=critical || true

  # ========================================================================
  # SHARED SCANS - Run on all branches and PRs
  # ========================================================================

  # Secret scanning - ALL branches
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential hardcoded secrets..."
          
          patterns=(
            'password[[:space:]]*=[[:space:]]*["'\'''][^"'\''"]+["'\''']'
            'secret[[:space:]]*=[[:space:]]*["'\'''][^"'\''"]+["'\''']'
            'api_key[[:space:]]*=[[:space:]]*["'\'''][^"'\''"]+["'\''']'
            'apikey[[:space:]]*=[[:space:]]*["'\'''][^"'\''"]+["'\''']'
          )
          
          found_issues=0
          for pattern in "${patterns[@]}"; do
            matches=$(grep -r -i "$pattern" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v ".test." | grep -v ".spec." | grep -v "example" | grep -v "README" | grep -v "CHANGELOG" || true)
            
            if [ -n "$matches" ]; then
              echo "⚠️  Potential hardcoded value found:"
              echo "$matches" | head -5
              found_issues=$((found_issues + 1))
            fi
          done
          
          if [ $found_issues -gt 0 ]; then
            echo ""
            echo "ℹ️  Found $found_issues potential issues. Review if these are actual secrets."
          else
            echo "✅ No obvious hardcoded secrets detected."
          fi
        shell: bash

  # Dependency review - PRs ONLY
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: moderate
          allow-ghsas: false
