name: Security Audit

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'

jobs:
  # Backend npm audit
  backend-audit:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: false

      - name: Run npm audit fix check (informational)
        run: |
          echo "Checking for auto-fixable vulnerabilities..."
          npm audit fix --dry-run 2>&1 || true

  # Frontend npm audit
  frontend-audit:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: false

      - name: Run npm audit fix check (informational)
        run: |
          echo "Checking for auto-fixable vulnerabilities..."
          npm audit fix --dry-run 2>&1 || true

  # CodeQL Analysis for JavaScript/TypeScript
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Run extended queries including security-extended
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  # Secret scanning with GitHub's built-in secret scanning
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for hardcoded secrets (basic grep)
        run: |
          echo "Scanning for potential hardcoded secrets..."
          # Check for common secret patterns (this is a basic check)
          # GitHub's secret scanning does the heavy lifting
          
          # List of patterns to check (informational only)
          patterns=(
            'password[[:space:]]*=[[:space:]]*["'\'''][^"'\''"]+["'\''']'
            'secret[[:space:]]*=[[:space:]]*["'\'''][^"'\''"]+["'\''']'
            'api_key[[:space:]]*=[[:space:]]*["'\'''][^"'\''"]+["'\''']'
            'apikey[[:space:]]*=[[:space:]]*["'\'''][^"'\''"]+["'\''']'
          )
          
          found_issues=0
          for pattern in "${patterns[@]}"; do
            # Exclude test files, config examples, and node_modules
            matches=$(grep -r -i "$pattern" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v ".test." | grep -v ".spec." | grep -v "example" | grep -v "README" | grep -v "CHANGELOG" || true)
            
            if [ -n "$matches" ]; then
              echo "⚠️  Potential hardcoded value found (review recommended):"
              echo "$matches" | head -5
              found_issues=$((found_issues + 1))
            fi
          done
          
          if [ $found_issues -gt 0 ]; then
            echo ""
            echo "ℹ️  Found $found_issues potential issues. These may be false positives."
            echo "   Review manually if these are actual secrets or just configuration values."
          else
            echo "✅ No obvious hardcoded secrets detected in code files."
          fi
        shell: bash

  # Trivy vulnerability scanner for Docker images
  trivy-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner - Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail the build, just report

      - name: Run Trivy vulnerability scanner - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail the build, just report

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'trivy-backend'

      - name: Upload Trivy frontend results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'trivy-frontend'

  # Dependency review for PRs
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          # Fail on moderate or higher vulnerabilities in new dependencies
          fail-on-severity: moderate
          # Don't allow dependencies with known vulnerabilities
          allow-ghsas: false
