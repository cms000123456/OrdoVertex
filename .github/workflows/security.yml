name: Security Audit

on:
  push:
    branches: [dev]  # Only run on dev branch during testing
  pull_request:
    branches: [dev]
  # schedule:
  #   # Run weekly on Mondays at 9 AM UTC
  #   - cron: '0 9 * * 1'

jobs:
  # ========================================================================
  # FULL SCANS - Run on main branch, PRs to main, and schedule
  # ========================================================================

  # Backend npm audit - FULL
  backend-audit-full:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        # Don't fail the build - just report for now
        continue-on-error: true

  # Frontend npm audit - FULL
  frontend-audit-full:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: |
          # Use legacy peer deps for React 17/18 compatibility issues
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Run npm audit
        run: npm audit --audit-level=moderate --legacy-peer-deps
        continue-on-error: true

  # CodeQL Analysis - FULL (only on main and schedule)
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

  # Trivy vulnerability scanner - FULL (only on main and schedule)
  trivy-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main' || github.event_name == 'schedule'
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner - Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Run Trivy vulnerability scanner - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'trivy-backend'

      - name: Upload Trivy frontend results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'trivy-frontend'

  # ========================================================================
  # LIGHTWEIGHT SCANS - Run on dev branch only
  # ========================================================================

  # Quick audit - LIGHTWEIGHT (dev branch only)
  quick-audit-dev:
    name: Quick Security Check (Dev)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Quick Backend Audit (Critical only)
        working-directory: ./backend
        run: |
          npm ci --quiet
          npm audit --audit-level=critical || echo "Critical vulnerabilities found (see logs)"
        continue-on-error: true

      - name: Quick Frontend Audit (Critical only)
        working-directory: ./frontend
        run: |
          npm ci --quiet --legacy-peer-deps || npm install --legacy-peer-deps --quiet
          npm audit --audit-level=critical --legacy-peer-deps || echo "Critical vulnerabilities found (see logs)"
        continue-on-error: true

  # ========================================================================
  # SHARED SCANS - Run on all branches and PRs
  # ========================================================================

  # Secret scanning - ALL branches
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Scanning for potential hardcoded secrets..."
          
          # Create temp file for results
          RESULTS_FILE=$(mktemp)
          
          # Pattern 1: Private keys
          echo "Checking for private keys..." >> "$RESULTS_FILE"
          grep -r -n "BEGIN.*PRIVATE KEY" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.pem" --include="*.key" . 2>/dev/null | grep -v "node_modules" | grep -v ".git" | head -5 >> "$RESULTS_FILE" || true
          
          # Pattern 2: AWS Access Keys  
          echo "" >> "$RESULTS_FILE"
          echo "Checking for AWS keys..." >> "$RESULTS_FILE"
          grep -r -n -E 'AKIA[0-9A-Z]{16}' --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" . 2>/dev/null | grep -v "node_modules" | grep -v ".git" | head -5 >> "$RESULTS_FILE" || true
          
          # Pattern 3: Hardcoded passwords (simple check)
          echo "" >> "$RESULTS_FILE"
          echo "Checking for hardcoded passwords..." >> "$RESULTS_FILE"
          grep -r -n -E '(password|passwd|pwd)[[:space:]]*=[[:space:]]*["'\''"'\''"'][a-zA-Z0-9!@#$%^&*]{10,}["'\''"'\''"]' --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" . 2>/dev/null | \
            grep -v "node_modules" | grep -v ".git" | \
            grep -v "process.env" | grep -v "getenv" | \
            grep -v "example" | grep -v "placeholder" | grep -v "test" | \
            head -5 >> "$RESULTS_FILE" || true
          
          # Display results
          if [ -s "$RESULTS_FILE" ] && [ $(wc -l < "$RESULTS_FILE") -gt 3 ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⚠️  Potential secrets found (review required):"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            cat "$RESULTS_FILE"
            echo ""
            echo "ℹ️  Note: Many matches may be false positives."
          else
            echo "✅ No obvious hardcoded secrets detected."
          fi
          
          rm -f "$RESULTS_FILE"
          exit 0
        shell: bash

  # Dependency review - PRs ONLY
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          # Only fail on high/critical for new dependencies in PRs
          fail-on-severity: high
          # Allow dependencies with known vulnerabilities if needed
          allow-ghsas: false
